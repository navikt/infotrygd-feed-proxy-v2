version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "org.springframework.boot*"
        update-types: ["version-update:semver-major"]
    groups:
      spring-boot-minor:
        patterns: ["org.springframework.boot*"]
        update-types: ["minor"]
      maven-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      maven-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directories:
      - "/backend"
      - "/mock-oidc"
    schedule:
      interval: "weekly"
    groups:
      docker-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      docker-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-compose-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      docker-compose-major:
        patterns: ["*"]
        update-types: ["major"]
